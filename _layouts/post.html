---
layout: default
---
<article class="post">
  <div class="post-header">
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
      <span class="post-date">{{ page.date | date: "%B %d, %Y" }}</span>
      {% if page.tags and page.tags.size > 0 %}
      <div class="post-tags">
        {% for tag in page.tags %}
        <a href="/projects/{{ tag | slugify }}" class="tag">{{ tag }}</a>
        {% endfor %}
      </div>
      {% endif %}
    </div>
  </div>
  <div class="post-content">
    {{ content }}
  </div>
  <div class="post-back">
    <a href="/blog">&larr; back to blog</a>
  </div>
</article>
